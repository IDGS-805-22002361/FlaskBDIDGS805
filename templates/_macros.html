{%macro datos(name,placeholder,type='text', value='')%}

<p>
  <input
    name="{{name}}"
    type="{{type}}"
    placeholder="{{placeholder}}"
    value="{{value}}"
    class="text-sm block w-full p-2.5"
  />
</p>

{%endmacro%} {%macro camposNuevos(field) %}
<h2 class="font-bold text-gray-800">{{field.label}}</h2>
<dd>{{field(**kwargs) | safe}}</dd>
{%if field.errors%}
<ul>
  {%for error in field.errors%}
  <li style="color: red">{{error}}</li>
  {%endfor%}
</ul>

{%endif%} {%endmacro%}
